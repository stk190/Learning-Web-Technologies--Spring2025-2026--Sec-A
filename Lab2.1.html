<!DOCTYPE html>
<html>
<head>
    <title>Page 1</title>
</head>
    <body>    
        <h1>1. Name</h1>
        <input type="text" name="name" id="name" />
        <br>
        <br><button type="submit">Submit</button>
        <hr>

        <h1>2. Email</h1>
        <input type="text" name="email" id="email" />
        <button type="button" onclick="alert('hint: sample@example.com')">i</button>
        <br>
        <br><button type="submit">Submit</button>
        <hr>

        <fieldset>
            <h1>3. Gender</h1>
            <label><input type="radio" name="gender" value="male"> Male</label><br>
            <label><input type="radio" name="gender" value="female"> Female</label><br>
            <label><input type="radio" name="gender" value="other"> Other</label><br>
            <br><button type="submit">Submit</button>
            <hr>
        </fieldset>

        <fieldset>
            <h1>4. Date of birth</h1>
            <input type="date" name="dob" id="dob" /><br>
            <br><button type="submit">Submit</button>
            <hr>
        </fieldset>

        <fieldset>
            <h1>5. Degree</h1>
            <label><input type="radio" name="degree" value="SSC"> SSC</label><br>
            <label><input type="radio" name="degree" value="HSC"> HSC</label><br>
            <label><input type="radio" name="degree" value="BSc"> BSc</label><br>
            <br><button type="submit">Submit</button>
            <hr>
        </fieldset>
       
        <h1>6. Blood Group</h1>
        <select name="blood_group" id="blood_group">
            <option value="">--Select--</option>
            <option value="A+">A+</option>
            <option value="A-">A-</option>
            <option value="B+">B+</option>
            <option value="B-">B-</option>
            <option value="O+">O+</option>
            <option value="O-">O-</option>
            <option value="AB+">AB+</option>
            <option value="AB-">AB-</option>
        </select>
        <br><hr>
        <button type="submit">Submit</button>
        

        <br><fieldset>
            <h1>7. Profile Picture</h1>

            <br>

        </fieldset>

</html>
